name: Multi-Environment Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validando pipeline
        run: echo "Testes passaram!"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test

    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Staging
        run: |
          echo "Deploy em staging!"
          echo "SHA=${{ github.sha }}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging

    if: github.ref == 'refs/heads/main'

    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Production
        run: |
          echo "Deploy em produção!"
          echo "SHA=${{ github.sha }}"